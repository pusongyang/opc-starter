openapi: 3.1.0
info:
  title: OPC-Starter AI Assistant API
  version: 2.1.0
  description: |
    当前仓库对外暴露的 Edge Function 契约。以 `app/supabase/functions/ai-assistant/*`
    的实现为最终行为真相源，以本文件为机器可读发布契约。
servers:
  - url: https://{projectRef}.supabase.co
    description: Supabase production project
    variables:
      projectRef:
        default: your-project-ref
paths:
  /functions/v1/ai-assistant:
    post:
      operationId: postAiAssistant
      summary: Stream AI assistant responses over SSE
      description: |
        接收消息历史与页面上下文，返回 `text/event-stream` 响应。
        成功时按 `text_delta` / `tool_call` / `a2ui` / `done` 等事件流式输出。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIAssistantRequest'
            examples:
              navigatePersons:
                summary: 导航到组织管理
                value:
                  messages:
                    - role: user
                      content: 帮我导航到组织管理页面
                  context:
                    currentPage: dashboard
                    viewContext:
                      viewMode: mine
                      teamId: null
                      teamName: null
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                basic:
                  summary: SSE 片段示例
                  value: |-
                    event: text_delta
                    data: {"content":"好的，"}

                    event: tool_call
                    data: {"id":"call_abc123","name":"navigateToPage","arguments":{"page":"persons"}}

                    event: done
                    data: {"iterations":1,"usage":{"prompt_tokens":500,"completion_tokens":100}}
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: messages 不能为空
        '401':
          description: Missing or invalid authorization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 缺少 Authorization 头
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 仅支持 POST 请求
        '500':
          description: Server-side failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: 未配置 ALIYUN_BAILIAN_API_KEY
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AIAssistantRequest:
      type: object
      additionalProperties: false
      required:
        - messages
      properties:
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RequestMessage'
        context:
          $ref: '#/components/schemas/AgentContext'
        threadId:
          type: string
          description: 会话线程 ID；当前实现会透传到后端日志与后续链路
    RequestMessage:
      type: object
      additionalProperties: false
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
            - tool
        content:
          type: string
        toolCallId:
          type: string
        name:
          type: string
    AgentContext:
      type: object
      additionalProperties: false
      properties:
        currentPage:
          type: string
          enum:
            - dashboard
            - persons
            - profile
            - settings
            - cloud-storage
            - other
        viewContext:
          $ref: '#/components/schemas/ViewContext'
    ViewContext:
      type: object
      additionalProperties: false
      properties:
        viewMode:
          type: string
        teamId:
          type:
            - string
            - 'null'
        teamName:
          type:
            - string
            - 'null'
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
